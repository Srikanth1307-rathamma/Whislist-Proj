apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: wishlist
    tier: frontend
spec:
  replicas: 2  # Running 2 replicas for high availability
  selector:
    matchLabels:
      app: wishlist
      tier: frontend
  template:
    metadata:
      labels:
        app: wishlist
        tier: frontend
    spec:
      containers:
      - name: frontend-web
        # Uses the frontend image we built earlier
        image: wishlist-frontend:v1
        imagePullPolicy: Never 
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: wishlist
    tier: frontend
  ports:
    - port: 80
      targetPort: 80
  # NodePort exposes the service outside your cluster on your local machine
  type: NodePort
