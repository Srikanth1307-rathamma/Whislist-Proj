<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Wishlist App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #007bff; }
        input { width: 75%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        ul { list-style-type: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; background: #f9f9f9; border-bottom: 1px solid #eee; margin-bottom: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Wishlist</h1>
        <div style="display: flex; justify-content: space-between;">
            <input type="text" id="itemInput" placeholder="Enter an item...">
            <button onclick="addItem()">Add</button>
        </div>
        <ul id="wishlist"></ul>
    </div>

    <script>
        // BACKEND_API_URL will be dynamically injected or resolved by Kubernetes Ingress/Service
        const API_URL = window.location.origin + "/api";

        async function fetchWishlist() {
            try {
                const res = await fetch(`${API_URL}/wishlist`);
                const data = await res.json();
                const list = document.getElementById('wishlist');
                list.innerHTML = '';
                data.wishlist.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    list.appendChild(li);
                });
            } catch (err) {
                console.error("Error fetching wishlist:", err);
            }
        }

        async function addItem() {
            const input = document.getElementById('itemInput');
            if (!input.value) return;

            try {
                await fetch(`${API_URL}/wishlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item: input.value })
                });
                input.value = '';
                fetchWishlist();
            } catch (err) {
                console.error("Error adding item:", err);
            }
        }

        // Fetch items on load
        fetchWishlist();
    </script>
</body>
</html>
